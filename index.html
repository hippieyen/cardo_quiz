    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --deep-navy: #0a0e1a;
      --navy: #0d1526;
      --navy-card: #111827;
      --nebula-blue: #1a2a4a;
      --teal: #2dd4bf;
      --teal-dim: #1a9e8f;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --star-white: #e8eaf6;
      --text-muted: #8899bb;
      --border: rgba(45, 212, 191, 0.18);
      --border-gold: rgba(201, 168, 76, 0.3);
    }

    html, body {
      height: 100%;
      background: var(--deep-navy);
      color: var(--star-white);
      font-family: 'Segoe UI', 'PingFang TC', 'Noto Sans TC', sans-serif;
      overflow-x: hidden;
    }

    /* ── Starfield Canvas ── */
    #starfield {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Layout ── */
    .app {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
    }

    /* ── Header ── */
    .header {
      width: 100%;
      max-width: 480px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .logo {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.12em;
      background: linear-gradient(135deg, var(--gold-light), var(--teal));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .page-label {
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 0.08em;
    }

    /* ── Progress Bar ── */
    .progress-wrap {
      width: 100%;
      max-width: 480px;
      margin-bottom: 32px;
    }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .progress-title {
      font-size: 13px;
      color: var(--gold);
      letter-spacing: 0.06em;
      font-weight: 600;
    }
    .progress-pct {
      font-size: 13px;
      color: var(--text-muted);
    }
    .progress-track {
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--teal), var(--gold));
      border-radius: 99px;
      transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    }

    /* ── Dots ── */
    .dots {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-top: 12px;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      transition: background 0.3s, transform 0.3s;
    }
    .dot.active { background: var(--teal); transform: scale(1.3); }
    .dot.done   { background: var(--gold); }

    /* ── Section Badge ── */
    .section-badge {
      width: 100%;
      max-width: 480px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .badge-icon {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1.5px solid var(--border-gold);
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      background: rgba(201,168,76,0.08);
    }
    .badge-text {
      font-size: 15px;
      font-weight: 600;
      color: var(--gold-light);
      letter-spacing: 0.05em;
    }
    .badge-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ── Question Cards ── */
    .questions {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .q-card {
      background: linear-gradient(135deg, rgba(17,24,39,0.92), rgba(26,42,74,0.7));
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 22px 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.35);
      backdrop-filter: blur(8px);
      opacity: 0;
      transform: translateY(18px);
      animation: cardIn 0.4s forwards;
    }
    .q-card:nth-child(1) { animation-delay: 0.05s; }
    .q-card:nth-child(2) { animation-delay: 0.15s; }
    .q-card:nth-child(3) { animation-delay: 0.25s; }

    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .q-num {
      font-size: 11px;
      letter-spacing: 0.12em;
      color: var(--teal);
      font-weight: 600;
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    .q-text {
      font-size: 15px;
      line-height: 1.65;
      color: var(--star-white);
      margin-bottom: 16px;
    }

    /* ── Options ── */
    .options {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .option {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1.5px solid rgba(255,255,255,0.08);
      cursor: pointer;
      transition: border-color 0.22s, background 0.22s, transform 0.15s;
      background: rgba(255,255,255,0.03);
      user-select: none;
    }
    .option:hover {
      border-color: var(--teal-dim);
      background: rgba(45,212,191,0.06);
      transform: translateX(3px);
    }
    .option.selected {
      border-color: var(--teal);
      background: rgba(45,212,191,0.12);
    }
    .option.selected .opt-letter {
      background: var(--teal);
      color: var(--deep-navy);
      border-color: var(--teal);
    }
    .opt-letter {
      flex-shrink: 0;
      width: 26px; height: 26px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      transition: background 0.22s, color 0.22s, border-color 0.22s;
      margin-top: 1px;
    }
    .opt-text {
      font-size: 14px;
      line-height: 1.55;
      color: var(--star-white);
      padding-top: 2px;
    }

    /* ── Navigation ── */
    .nav {
      width: 100%;
      max-width: 480px;
      margin-top: 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .btn {
      flex: 1;
      padding: 14px 0;
      border-radius: 14px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-back {
      background: rgba(255,255,255,0.05);
      color: var(--text-muted);
      border: 1.5px solid rgba(255,255,255,0.1);
      flex: 0.6;
    }
    .btn-back:hover { background: rgba(255,255,255,0.09); color: var(--star-white); }
    .btn-next {
      background: linear-gradient(135deg, var(--teal), var(--teal-dim));
      color: var(--deep-navy);
      box-shadow: 0 4px 18px rgba(45,212,191,0.35);
    }
    .btn-next:hover { opacity: 0.9; box-shadow: 0 6px 22px rgba(45,212,191,0.45); }
    .btn-next:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      box-shadow: none;
    }
    .btn-next.pulse {
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 4px 18px rgba(45,212,191,0.35); }
      50%      { box-shadow: 0 4px 30px rgba(45,212,191,0.6); }
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(30,40,60,0.95);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 22px;
      font-size: 14px;
      color: var(--star-white);
      backdrop-filter: blur(10px);
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
      z-index: 100;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Completion overlay ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,14,26,0.92);
      z-index: 50;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
      text-align: center;
      padding: 32px;
    }
    .overlay.show { display: flex; }
    .overlay-icon { font-size: 52px; animation: float 3s ease-in-out infinite; }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-10px); }
    }
    .overlay-title {
      font-size: 26px; font-weight: 700;
      background: linear-gradient(135deg, var(--gold-light), var(--teal));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .overlay-sub { font-size: 15px; color: var(--text-muted); line-height: 1.6; }
    .btn-result {
      padding: 15px 42px;
      border-radius: 16px;
      border: none;
      font-size: 16px; font-weight: 700;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: var(--deep-navy);
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(201,168,76,0.4);
      letter-spacing: 0.06em;
      transition: opacity 0.2s;
    }
    .btn-result:hover { opacity: 0.9; }
  </style>
</head>

// ══════════════════════════════════════

function render() {
  const pg = PAGES[currentPage];
  const totalPages = PAGES.length;
  const pct = Math.round((currentPage / totalPages) * 100);

  // Header
  document.getElementById('headerPage').textContent = `第 ${currentPage+1} 頁 / 共 ${totalPages} 頁`;

  // Progress
  document.getElementById('progressTitle').textContent = pg.section;
  document.getElementById('progressPct').textContent = `${pct}%`;
  document.getElementById('progressFill').style.width = `${pct}%`;

  // Dots
  const dotsEl = document.getElementById('dots');
  dotsEl.innerHTML = PAGES.map((_, i) => {
    let cls = '';
    if (i === currentPage) cls = 'active';
    else if (i < currentPage) cls = 'done';
    return `<div class="dot ${cls}"></div>`;
  }).join('');

  // Section badge
  document.getElementById('badgeIcon').textContent = pg.icon;
  document.getElementById('badgeName').textContent = pg.section;
  const qNums = `${currentPage * 3 + 1}–${currentPage * 3 + 3}`;
  document.getElementById('badgeSub').textContent = `${pg.englishLabel} · 第 ${qNums} 題`;

  // Questions
  const wrap = document.getElementById('questionsWrap');
  wrap.innerHTML = pg.questions.map((q, qi) => {
    const selected = answers[q.id];
    return `
      <div class="q-card">
        <div class="q-num">Q${currentPage * 3 + qi + 1} / 18</div>
        <div class="q-text">${q.text}</div>
        <div class="options">
          ${q.options.map(o => `
            <div class="option ${selected === o.key ? 'selected' : ''}"
                 onclick="selectAnswer('${q.id}','${o.key}',this)">
              <div class="opt-letter">${o.key}</div>
              <div class="opt-text">${o.text}</div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }).join('');

  // Back button
  document.getElementById('btnBack').style.display = currentPage === 0 ? 'none' : '';

  // Next button
  const isLastPage = currentPage === PAGES.length - 1;
  document.getElementById('btnNext').innerHTML = isLastPage ? '完成測驗 ✦' : '繼續 →';
  checkPageComplete();
}

function selectAnswer(qId, key, el) {
  answers[qId] = key;
  // Update UI for this question
  const card = el.closest('.q-card');
  card.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  checkPageComplete();
}

function checkPageComplete() {
  const pg = PAGES[currentPage];
  const allDone = pg.questions.every(q => answers[q.id]);
  const btn = document.getElementById('btnNext');
  btn.disabled = !allDone;
  if (allDone) btn.classList.add('pulse');
  else btn.classList.remove('pulse');

  const isLast = currentPage === PAGES.length - 1;
  btn.innerHTML = isLast ? '完成測驗 ✦' : '繼續 →';
}

function goNext() {
  const pg = PAGES[currentPage];
  if (!pg.questions.every(q => answers[q.id])) {
    showToast('請完成本頁所有題目 ✦');
    return;
  }
  if (currentPage < PAGES.length - 1) {
    currentPage++;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    submitQuiz();
  }
}

function goBack() {
  if (currentPage > 0) {
    currentPage--;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

// ══════════════════════════════════════
//  SUBMIT
// ══════════════════════════════════════
async function submitQuiz() {
  showToast('儲存中⋯');
  try {
    const { data: { user } } = await sb.auth.getUser();
    if (user) {
      await sb.from('profiles').upsert({
        id: user.id,
        quiz_answers: answers,
        quiz_completed_at: new Date().toISOString(),
      });
    }
  } catch(e) {
    console.warn('Supabase save skipped:', e.message);
  }
  // Show completion overlay
  document.getElementById('overlay').classList.add('show');
}

function goToResult() {
  // Pass answers via sessionStorage then redirect
  sessionStorage.setItem('cardo_quiz_answers', JSON.stringify(answers));
  window.location.href = 'cardo_result.html';
}

// ══════════════════════════════════════
//  TOAST
// ══════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ══════════════════════════════════════
//  STARFIELD
// ══════════════════════════════════════
(function() {
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    stars = Array.from({ length: 140 }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.4 + 0.3,
      a: Math.random(),
      speed: Math.random() * 0.004 + 0.002,
      phase: Math.random() * Math.PI * 2,
    }));
  }

  function draw(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      const alpha = s.a * (0.5 + 0.5 * Math.sin(t * s.speed + s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200, 220, 255, ${alpha})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  resize();
  requestAnimationFrame(draw);
})();

// ══════════════════════════════════════
//  INIT
// ══════════════════════════════════════
render();
</script>
